<div class="links">
    @for (item of content; track item.id) {
        <a class="button outline" [routerLink]="[]" [fragment]="item.id">{{item.title}}</a>
    }
</div>
<div class="info">
    <em>In template links:</em>
    <app-code-viewer [code]="linksTemplateCode" />
    <em>In template sections to scroll:</em>
    <app-code-viewer [code]="sectionTemplateCode" />
    <em>To make anchor links work in template, we should add to <strong>app.config.ts:</strong></em>
    <app-code-viewer [code]="routesTemplateCode" />
    <em>And for smoothness:</em>
    <app-code-viewer [code]="cssTemplateCode" />
</div>
@for (item of content; track $index) {
    <section [id]="item.id">
        <h3>#{{item.title}}</h3>
        <p>{{item.text}}</p>
    </section>
}
