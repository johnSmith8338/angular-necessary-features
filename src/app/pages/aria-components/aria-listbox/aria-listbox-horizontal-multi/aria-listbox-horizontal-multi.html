<div class="controls">
    <label class="toggle">
        <span>{{`Multi selection (${isMulti()}):`}}</span>
        <input type="checkbox" [checked]="isMulti()===true" (change)="toggleMultiSelection()" />
    </label>
    <label class="toggle focus">
        <span class="input">
            <span>{{`Selection&nbsp;mode&nbsp;(${selectionMode()}):`}}</span>
            <input type="checkbox" [checked]="selectionMode()==='follow'" (change)="toggleSelectionMode()" />
        </span>
        <small>
            @if (selectionMode()==='explicit') {
                <em>When you use keyboard arrows to navigate list, to select list item you should press Enter when item is focused</em>
            }@else {
                <em>When you use keyboard arrows to navigate list, item in focus is autoselected</em>
            }
        </small>
    </label>
</div>
<div ngListbox aria-label="user-select" orientation="horizontal" [selectionMode]="selectionMode()" [multi]="isMulti()">
    @for (user of users(); track user.id) {
        <div ngOption [value]="user" [label]="user.firstName">
            <span class="option-label button outline">{{user.firstName}}</span>
        </div>
    }
</div>
<div class="content">
    @if (selectedUser().length) {
        @for (user of selectedUser(); track user.id) {
            <app-user-card [user]="user" />
        }
    }@else {
        <p>Select user...</p>
    }
</div>
